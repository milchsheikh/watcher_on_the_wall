<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunpla Command Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; color: white; letter-spacing: 2px; }
        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }
        .status-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .model-list {
            text-align: left;
            display: inline-block;
            margin-top: 1rem;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

<header>
    <h1>PROTOCOL ACTIVATED</h1>
    <p>Deployment in progress</p>
</header>

<div class="container">
    <div class="status-card">
        <h2>Current Hangar Status</h2>
             
       <div class="status-card">
            <h3>🚀 Active Project: RX-93 Nu Gundam</h3>
    
            <img src="https://www.gundamplanet.com/cdn/shop/files/entry-grade-nu-gundam-gp.jpg?v=1737702463&width=493" 
         alt="Nu Gundam" 
         style="width: 75%; max-width: 300px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d;">

            <p>Grade: Entry Grade | Status: <strong>Assemble</strong></p>
    
            <div style="background-color: #30363d; border-radius: 10px; height: 20px; width: 100%; margin-top: 10px;">
            <div style="background-color: #238636; height: 100%; width: 50%; border-radius: 10px; text-align: center; font-size: 12px; color: white;">
            50%
            </div>
            </div>
        
            <div class="model-list">
                <p><strong>Pending Units:</strong></p>
                <ul>
                    <li>HGUC MSA-003 Nemo</li>
                    <li>HG Aerial Rebuild</li>
                    <li>HGUC RX-78GP03S</li>
                    <li>RGM-79C GM TYPE C</li>
                    <li>STAR BURNING GUNDAM CAMPAIGN</li>  
                </ul>
            </div>
        </div>
    </div>

    <a href="https://github.com/milchsheikh" class="btn">View Source Code</a>
</div>

</body>
</html>
