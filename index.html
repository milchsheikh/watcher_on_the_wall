<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gundam</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; color: white; letter-spacing: 2px; }
        .container {
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }
        .status-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .model-list {
            text-align: left;
            display: inline-block;
            margin-top: 1rem;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn:hover { background-color: #2ea043; }
  .slider-container {
            width: 100%;
            max-width: 400px;
            margin: auto;
            overflow: hidden;
            position: relative;
            height: 400px;
        }

  /* Ukrywamy kropki radio */
        input[name="slider"] {
            display: none;
        }

        .slides {
            display: flex;
            width: 400%; /* 4 zdjęcia po 100% każde */
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .slide {
            width: 25%; /* 1/4 z 400% to dokładnie szerokość kontenera */
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

  /* Logika przesuwania - najfajniejsza część */
        #s1:checked ~ .slides { transform: translateX(0%); }
        #s2:checked ~ .slides { transform: translateX(-25%); }
        #s3:checked ~ .slides { transform: translateX(-50%); }
        #s4:checked ~ .slides { transform: translateX(-75%); }
        
  /* Wygląd strzałek / kropek na dole */
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .controls label {
            width: 15px;
            height: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #000;
        }

  /* Podświetlenie aktywnej "kropki" */
  #s1:checked ~ .controls .to-s1,
  #s2:checked ~ .controls .to-s2,
  #s3:checked ~ .controls .to-s3,
  #s4:checked ~ .controls .to-s4
 {
    background: #2d54a7;
  }


        
    </style>
</head>
<body>

<header>
    <h1>DEPLOYED</h1>
   
</header>

<div class="container">
             
    <div class="status-card">
            <h3>🚀 Active Project: RX-93 Nu Gundam</h3>
           
        <div class="slider-container">
          <input type="radio" name="slider" id="s1" checked>
          <input type="radio" name="slider" id="s2">
          <input type="radio" name="slider" id="s3">
          <input type="radio" name="slider" id="s4">
        
          
        <div class="slides">
        <div class="slide s1">  <img src="image/G2.jpg" 
         alt="Nu Gundam" 
         style="width: 75%; max-width: 300px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d;"></div>
        <div class="slide s2">  <img src="image/G3.jpg"
         alt="Nu Gundam" 
         style="width: 75%; max-width: 300px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d;"></div>
        <div class="slide s3">  <img src="image/G4.jpg"
         alt="Nu Gundam" 
         style="width: 75%; max-width: 300px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d;"></div>
        <div class="slide s4">  <img src="image/G5.jpg"
         alt="Nu Gundam" 
         style="width: 75%; max-width: 300px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d;"></div>
          </div>
            <div class="slide s5">  <img src="image/G5.jpg"
         alt="Nu Gundam" 
         style="width: 75%; max-width: 300px; border-radius: 8px; margin: 15px 0; border: 1px solid #30363d;"></div>
          </div>

          <div class="controls">
            <label for="s1" class="to-s1"></label>
            <label for="s2" class="to-s2"></label>
            <label for="s3" class="to-s3"></label>
            <label for="s4" class="to-s4"></label>
           
 
          </div>
          </div>

            <p>Grade: Entry Grade | Status: <strong>Assemble</strong></p>
    
            <div style="background-color: #30363d; border-radius: 10px; height: 20px; width: 100%; margin-top: 10px;">
            <div style="background-color: #238636; height: 100%; width: 100%; border-radius: 10px; text-align: center; font-size: 12px; color: white;">
            100%
            </div>
            </div>
        
            <div class="model-list">
                <p><strong>Pending Units:</strong></p>
                <ul>
                    <li>HGUC MSA-003 Nemo</li>
                    <li>HG Aerial Rebuild</li>
                    <li>HGUC RX-78GP03S</li>
                    <li>RGM-79C GM TYPE C</li>
                    <li>STAR BURNING GUNDAM CAMPAIGN</li>  
                </ul>
            </div>
    </div>


    <a href="https://github.com/milchsheikh" class="btn">View Source Code</a>
</div>

</body>
</html>
